
services:
  # SQL Server Database - Each service has its own database
  mssql-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mechira-mssql-db
    user: root
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourPasswordHere123!"
      MSSQL_PID: "Developer"
  
    volumes:
      - mssql-data:/var/opt/mssql/data
      - mssql-log:/var/opt/mssql/log
      - mssql-backup:/var/opt/mssql/backup
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourPasswordHere123! -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  seq:
    image: datalust/seq:latest
    container_name: seq-logs
    ports:
      - "8081:80"
      - "5341:5341"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
  # AuthService
  auth-service:
    build:
      context: .
      dockerfile: Services/AuthService/Dockerfile
    container_name: mechira-auth-service
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_URLS: http://+:5001
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mssql-db,1433;Database=Mechira-AuthService;User Id=sa;Password=YourPasswordHere123!;TrustServerCertificate=true;Encrypt=false;"
      Jwt__SecretKey: "your-super-secret-key-that-must-be-at-least-32-characters-long-for-hmac256"
      Jwt__Issuer: "AuthService"
      Jwt__Audience: "MicroservicesApi"
      Jwt__ExpiryMinutes: "60"
      ServiceUrls__AuthService: "http://auth-service:5001"
      ServiceUrls__CatalogService: "http://nginx-catalog:5002"
      ServiceUrls__OrderService: "http://order-service:5003"
      ServiceUrls__LotteryService: "http://lottery-service:5004"
    depends_on:
      mssql-db:
        condition: service_healthy
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/5001'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # MongoDB - Document database for CatalogService Gifts (Polyglot Persistence)
  mongodb:
    image: mongo:7.0
    container_name: mechira-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # CatalogService - Replica 1 (behind Nginx load balancer)
  catalog-service-1:
    build:
      context: .
      dockerfile: Services/CatalogService/Dockerfile
    container_name: mechira-catalog-service-1
    # No direct port exposure — traffic goes through nginx-catalog
    environment:
      ASPNETCORE_URLS: http://+:5002
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mssql-db,1433;Database=Mechira-CatalogService;User Id=sa;Password=YourPasswordHere123!;TrustServerCertificate=true;Encrypt=false;"
      ConnectionStrings__MongoConnection: "mongodb://mongodb:27017"
      Jwt__SecretKey: "your-super-secret-key-that-must-be-at-least-32-characters-long-for-hmac256"
      Jwt__Issuer: "AuthService"
      Jwt__Audience: "MicroservicesApi"
      Jwt__ExpiryMinutes: "60"
      ServiceUrls__AuthService: "http://auth-service:5001"
      ServiceUrls__CatalogService: "http://nginx-catalog:5002"
      ServiceUrls__OrderService: "http://order-service:5003"
      ServiceUrls__LotteryService: "http://lottery-service:5004"
      RabbitMQ__Host: "rabbitmq-service"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
    depends_on:
      mssql-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq-service:
        condition: service_healthy
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/5002'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # CatalogService - Replica 2 (behind Nginx load balancer)
  catalog-service-2:
    build:
      context: .
      dockerfile: Services/CatalogService/Dockerfile
    container_name: mechira-catalog-service-2
    environment:
      ASPNETCORE_URLS: http://+:5002
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mssql-db,1433;Database=Mechira-CatalogService;User Id=sa;Password=YourPasswordHere123!;TrustServerCertificate=true;Encrypt=false;"
      ConnectionStrings__MongoConnection: "mongodb://mongodb:27017"
      Jwt__SecretKey: "your-super-secret-key-that-must-be-at-least-32-characters-long-for-hmac256"
      Jwt__Issuer: "AuthService"
      Jwt__Audience: "MicroservicesApi"
      Jwt__ExpiryMinutes: "60"
      ServiceUrls__AuthService: "http://auth-service:5001"
      ServiceUrls__CatalogService: "http://nginx-catalog:5002"
      ServiceUrls__OrderService: "http://order-service:5003"
      ServiceUrls__LotteryService: "http://lottery-service:5004"
      RabbitMQ__Host: "rabbitmq-service"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
    depends_on:
      mssql-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq-service:
        condition: service_healthy
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/5002'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Nginx Load Balancer for CatalogService (round-robin across 2 replicas)
  # Proof: call GET /catalog/gifts repeatedly and observe X-Upstream-Server header alternating
  nginx-catalog:
    image: nginx:alpine
    container_name: mechira-nginx-catalog
    ports:
      - "5002:5002"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      catalog-service-1:
        condition: service_healthy
      catalog-service-2:
        condition: service_healthy
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # OrderService
  order-service:
    build:
      context: .
      dockerfile: Services/OrderService/Dockerfile
    container_name: mechira-order-service
    ports:
      - "5003:5003"
    environment:
      ASPNETCORE_URLS: http://+:5003
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mssql-db,1433;Database=Mechira-OrderService;User Id=sa;Password=YourPasswordHere123!;TrustServerCertificate=true;Encrypt=false;"
      Jwt__SecretKey: "your-super-secret-key-that-must-be-at-least-32-characters-long-for-hmac256"
      Jwt__Issuer: "AuthService"
      Jwt__Audience: "MicroservicesApi"
      Jwt__ExpiryMinutes: "60"
      ServiceUrls__AuthService: "http://auth-service:5001"
      ServiceUrls__CatalogService: "http://nginx-catalog:5002"
      ServiceUrls__OrderService: "http://order-service:5003"
      ServiceUrls__LotteryService: "http://lottery-service:5004"
      RabbitMQ__Host: "rabbitmq-service"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
    depends_on:
      mssql-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      rabbitmq-service:
        condition: service_healthy
      nginx-catalog:
        condition: service_healthy
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/5003'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # LotteryService
  lottery-service:
    build:
      context: .
      dockerfile: Services/LotteryService/Dockerfile
    container_name: mechira-lottery-service
    ports:
      - "5004:5004"
    environment:
      ASPNETCORE_URLS: http://+:5004
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mssql-db,1433;Database=Mechira-LotteryService;User Id=sa;Password=YourPasswordHere123!;TrustServerCertificate=true;Encrypt=false;"
      Jwt__SecretKey: "your-super-secret-key-that-must-be-at-least-32-characters-long-for-hmac256"
      Jwt__Issuer: "AuthService"
      Jwt__Audience: "MicroservicesApi"
      Jwt__ExpiryMinutes: "60"
      ServiceUrls__AuthService: "http://auth-service:5001"
      ServiceUrls__CatalogService: "http://nginx-catalog:5002"
      ServiceUrls__OrderService: "http://order-service:5003"
      ServiceUrls__LotteryService: "http://lottery-service:5004"
    depends_on:
      mssql-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      rabbitmq-service:
        condition: service_healthy
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/5004'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # NotificationService (Event-driven notification service)
  notification-service:
    build:
      context: .
      dockerfile: Services/NotificationService/Dockerfile
    container_name: mechira-notification-service
    ports:
      - "5005:5005"
    environment:
      ASPNETCORE_URLS: http://+:5005
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__SecretKey: "your-super-secret-key-that-must-be-at-least-32-characters-long-for-hmac256"
      Jwt__Issuer: "AuthService"
      Jwt__Audience: "MicroservicesApi"
      Jwt__ExpiryMinutes: "60"
      RabbitMQ__Host: "rabbitmq-service"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
    depends_on:
      rabbitmq-service:
        condition: service_healthy
    networks:
      - mechira-network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/5005'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: Gateway/ApiGateway/Dockerfile
    container_name: mechira-api-gateway
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__SecretKey: "your-super-secret-key-that-must-be-at-least-32-characters-long-for-hmac256"
      Jwt__Issuer: "AuthService"
      Jwt__Audience: "MicroservicesApi"
      Jwt__ExpiryMinutes: "60"
      # Gateway routing configuration (update if using environment variable configuration)
      ServiceUrls__AuthService: "http://auth-service:5001"
      ServiceUrls__CatalogService: "http://nginx-catalog:5002"
      ServiceUrls__OrderService: "http://order-service:5003"
      ServiceUrls__LotteryService: "http://lottery-service:5004"
    depends_on:
      auth-service:
        condition: service_healthy
      nginx-catalog:
        condition: service_healthy
      order-service:
        condition: service_healthy
      lottery-service:
        condition: service_healthy
    networks:
      - mechira-network
    restart: unless-stopped

  # RabbitMQ Message Broker
  rabbitmq-service:
    image: rabbitmq:3.13-management
    container_name: mechira-rabbitmq
    ports:
      - "5672:5672"      # AMQP protocol port
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      mechira-network:
        aliases:
          - rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Redis Cache
  redis-cache:
    image: redis:7-alpine
    container_name: mechira-redis
    ports:
      - "6379:6379"
    networks:
      mechira-network:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - redis-data:/data
    restart: unless-stopped

# Networks
networks:
  mechira-network:
    driver: bridge

# Volumes for database persistence
volumes:
  mssql-data:
    driver: local
  mssql-log:
    driver: local
  mssql-backup:
    driver: local
  rabbitmq-data:
    driver: local
  mongodb-data:
    driver: local
  redis-data:
    driver: local
  seq-data:
    driver: local
